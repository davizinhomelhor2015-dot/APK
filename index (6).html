<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>C.R.O.P — Comunicações</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --d0:#060a10;--d1:#0d1117;--d2:#161b22;--d3:#1c2128;--d4:#22272e;--d5:#2d333b;--d6:#3d444d;
  --gold:#c9a84c;--gold2:#e8c86a;--blue:#1565c8;--blue2:#2979e8;
  --red:#c8232a;--green:#22c97a;--yellow:#f5c518;--purple:#9b59b6;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --border:rgba(255,255,255,0.06);
  --radius:6px;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Barlow Condensed',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
  --font-classic:'Cinzel',serif;
  --current-font: var(--font-body);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--current-font);background:var(--d1);color:var(--t1);font-size:15px;}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--d6);border-radius:2px;}

/* ─── LOGIN ─── */
#loginScreen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--d0);
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  z-index:1000;
}
#loginScreen::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(21,101,200,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.login-box{
  width:100%;max-width:420px;margin:20px;
  background:var(--d2);
  border:1px solid var(--border);
  padding:40px 36px;
  position:relative;
}
.login-box::before,.login-box::after{
  content:'';position:absolute;width:16px;height:16px;border-color:var(--gold);border-style:solid;
}
.login-box::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.login-box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo img{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(201,168,76,0.4));margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}
.login-logo-name{font-family:var(--font-display);font-size:42px;letter-spacing:10px;color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,0.3);}
.login-logo-sub{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;}
.login-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border);}
.login-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-family:var(--font-mono);font-size:11px;letter-spacing:2px;color:var(--t3);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;}
.login-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.login-field{margin-bottom:16px;}
.login-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:6px;display:block;}
.login-input{width:100%;padding:11px 14px;background:rgba(0,0,0,0.3);border:1px solid var(--d6);color:var(--t1);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;padding:13px;background:var(--gold);border:none;color:var(--d0);font-family:var(--font-display);font-size:20px;letter-spacing:3px;cursor:pointer;transition:all .2s;margin-top:4px;}
.login-btn:hover{background:var(--gold2);box-shadow:0 0 20px rgba(201,168,76,0.3);}
.login-err{font-family:var(--font-mono);font-size:11px;color:var(--red);margin-top:10px;text-align:center;display:none;}
.login-err.show{display:block;}
.login-hint{margin-top:20px;padding:12px 16px;background:rgba(21,101,200,0.06);border:1px solid rgba(21,101,200,0.2);border-left:3px solid var(--blue);}
.login-hint-title{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--blue2);margin-bottom:8px;text-transform:uppercase;}
.login-hint-row{font-size:12px;color:var(--t2);line-height:1.7;}
.login-hint-row b{color:var(--t1);}

/* ─── APP LAYOUT ─── */
#app{display:none;height:100vh;flex-direction:row;}
#app.show{display:flex;}

/* Narrow icon bar */
.bar-icons{width:62px;background:var(--d0);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;border-right:1px solid var(--border);flex-shrink:0;}
.server-icon{width:44px;height:44px;border-radius:50%;background:var(--d3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.server-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.server-icon-text{font-family:var(--font-display);font-size:13px;color:var(--gold);letter-spacing:1px;}
.server-icon.active,.server-icon:hover{border-radius:30%;background:var(--d4);}
.server-icon.main-server{border:2px solid var(--gold);box-shadow:0 0 10px rgba(201,168,76,0.3);}
.icon-sep{width:32px;height:1px;background:var(--border);}

/* Channel sidebar */
.sidebar{width:240px;background:var(--d2);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .2s;min-height:52px;}
.sidebar-header:hover{background:var(--d3);}
.sidebar-header-name{font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--gold);}
.sidebar-header-chevron{margin-left:auto;color:var(--t2);font-size:12px;}
.channels-scroll{flex:1;overflow-y:auto;padding:8px 0;}
.ch-category{margin-top:4px;}
.ch-category-header{display:flex;align-items:center;gap:4px;padding:6px 8px 4px 12px;font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;cursor:pointer;user-select:none;}
.ch-category-header:hover{color:var(--t2);}
.ch-category-header .ch-add{margin-left:auto;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:14px;color:var(--t3);transition:all .2s;}
.ch-category-header .ch-add:hover{color:var(--t1);background:var(--d5);}
.ch-item{display:flex;align-items:center;gap:6px;padding:6px 8px 6px 14px;margin:1px 6px;border-radius:var(--radius);cursor:pointer;color:var(--t2);transition:all .2s;position:relative;}
.ch-item:hover{background:var(--d4);color:var(--t1);}
.ch-item.active{background:var(--d5);color:var(--t1);}
.ch-item-icon{font-size:16px;flex-shrink:0;}
.ch-item-name{font-size:14px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-item-badge{background:var(--red);color:white;font-size:10px;padding:1px 5px;border-radius:8px;font-family:var(--font-mono);}
.ch-voice-users{padding:2px 8px 6px 36px;}
.ch-voice-user{font-size:12px;color:var(--t3);padding:2px 0;display:flex;align-items:center;gap:6px;}
.ch-voice-user::before{content:'🎤';font-size:10px;}
.voice-active::before{content:'🎤';animation:voicePulse 1s ease-in-out infinite;}
@keyframes voicePulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* User bar */
.user-bar{padding:8px 10px;background:var(--d3);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;min-height:56px;}
.user-bar-avatar{width:32px;height:32px;border-radius:50%;background:var(--d5);cursor:pointer;flex-shrink:0;object-fit:cover;border:2px solid transparent;transition:border-color .2s;}
.user-bar-avatar:hover{border-color:var(--gold);}
.user-bar-info{flex:1;min-width:0;}
.user-bar-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);}
.user-bar-status{font-family:var(--font-mono);font-size:10px;color:var(--t3);}
.user-bar-actions{display:flex;gap:2px;}
.ub-btn{width:28px;height:28px;border-radius:var(--radius);background:transparent;border:none;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
.ub-btn:hover{background:var(--d5);color:var(--t1);}

/* ─── MAIN CONTENT ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ch-header{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;background:var(--d2);flex-shrink:0;}
.ch-header-icon{font-size:18px;color:var(--t2);}
.ch-header-name{font-family:var(--font-display);font-size:20px;letter-spacing:2px;color:var(--t1);}
.ch-header-sep{width:1px;height:20px;background:var(--d6);}
.ch-header-topic{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.ch-header-btns{display:flex;gap:4px;margin-left:auto;}
.ch-header-btn{width:28px;height:28px;background:transparent;border:none;color:var(--t2);cursor:pointer;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
.ch-header-btn:hover{background:var(--d5);color:var(--t1);}

/* Messages */
.messages-wrap{flex:1;overflow-y:auto;padding:16px 0 4px;}
.msg-day-sep{display:flex;align-items:center;gap:12px;padding:16px 16px 8px;color:var(--t3);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;}
.msg-day-sep::before,.msg-day-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.msg{display:flex;gap:14px;padding:4px 16px;transition:background .15s;position:relative;}
.msg:hover{background:rgba(255,255,255,0.02);}
.msg:hover .msg-actions{display:flex;}
.msg-first{padding-top:14px;}
.msg-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;object-fit:cover;background:var(--d5);}
.msg-avatar-placeholder{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:var(--d4);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);}
.msg-body{flex:1;min-width:0;}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
.msg-author{font-weight:600;font-size:14px;cursor:pointer;}
.msg-author:hover{text-decoration:underline;}
.msg-cargo{font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:2px;letter-spacing:1px;font-weight:normal;}
.msg-time{font-size:11px;color:var(--t3);}
.msg-content{font-size:15px;color:var(--t1);line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.msg-content a{color:var(--blue2);text-decoration:none;}
.msg-content a:hover{text-decoration:underline;}
.msg-image{max-width:380px;max-height:280px;border-radius:var(--radius);margin-top:6px;cursor:pointer;display:block;}
.msg-edited{font-size:11px;color:var(--t3);margin-left:4px;}
.msg-deleted{color:var(--t3);font-style:italic;font-size:14px;}
.msg-actions{display:none;position:absolute;right:16px;top:-12px;background:var(--d4);border:1px solid var(--border);border-radius:var(--radius);padding:2px;}
.msg-action-btn{width:28px;height:28px;background:transparent;border:none;cursor:pointer;border-radius:4px;color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.msg-action-btn:hover{background:var(--d5);color:var(--t1);}
.msg-action-btn.del:hover{color:var(--red);}
.msg-cont{display:flex;gap:14px;padding:1px 16px;}
.msg-cont-gap{width:38px;flex-shrink:0;}
.typing-indicator{padding:4px 16px 10px;font-size:13px;color:var(--t3);min-height:28px;}

/* Input */
.input-wrap{padding:0 16px 16px;}
.input-box{background:var(--d4);border-radius:var(--radius);display:flex;align-items:flex-end;gap:4px;padding:4px 6px;border:1px solid var(--border);}
.input-btn{width:34px;height:34px;background:transparent;border:none;cursor:pointer;color:var(--t2);font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);transition:all .2s;flex-shrink:0;}
.input-btn:hover{background:var(--d5);color:var(--t1);}
.input-field{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-family:var(--current-font);font-size:15px;resize:none;max-height:160px;min-height:34px;padding:6px 4px;line-height:1.4;}
.input-field::placeholder{color:var(--t3);}
.send-btn{width:34px;height:34px;background:var(--blue);border:none;cursor:pointer;color:white;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);transition:all .2s;flex-shrink:0;}
.send-btn:hover{background:var(--blue2);}

/* ─── MEMBERS SIDEBAR ─── */
.members-sidebar{width:220px;background:var(--d2);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:none;}
.members-sidebar.show{display:block;}
.members-role-group{padding:16px 8px 4px;}
.members-role-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:0 8px 6px;}
.member-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;transition:background .15s;}
.member-item:hover{background:var(--d4);}
.member-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--d5);flex-shrink:0;}
.member-avatar-ph{width:30px;height:30px;border-radius:50%;background:var(--d5);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t2);flex-shrink:0;}
.member-info{min-width:0;}
.member-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-status{font-size:11px;color:var(--t3);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green);}
.status-dot.offline{background:var(--t3);}

/* ─── VOICE AREA ─── */
.voice-area{background:var(--d3);border-top:1px solid var(--border);padding:10px 16px;display:none;align-items:center;gap:10px;}
.voice-area.show{display:flex;}
.voice-connected-info{flex:1;}
.voice-ch-name{font-family:var(--font-mono);font-size:11px;color:var(--green);letter-spacing:1px;}
.voice-ch-server{font-size:12px;color:var(--t3);}
.voice-btns{display:flex;gap:6px;}
.voice-btn{width:32px;height:32px;border-radius:var(--radius);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
.voice-btn.mute{background:var(--d5);color:var(--t1);}
.voice-btn.mute.active{background:var(--red);color:white;}
.voice-btn.disconnect{background:var(--red);color:white;}
.voice-btn:hover{filter:brightness(1.2);}

/* ─── EMOJI PICKER ─── */
.emoji-picker{
  position:absolute;bottom:80px;left:50px;
  width:340px;background:var(--d3);
  border:1px solid var(--border);
  border-radius:var(--radius);
  z-index:500;display:none;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}
.emoji-picker.show{display:block;}
.emoji-cats{display:flex;border-bottom:1px solid var(--border);padding:4px;}
.emoji-cat-btn{flex:1;padding:6px;background:transparent;border:none;cursor:pointer;font-size:16px;border-radius:4px;transition:background .15s;}
.emoji-cat-btn:hover,.emoji-cat-btn.active{background:var(--d5);}
.emoji-search{padding:8px;}
.emoji-search input{width:100%;padding:6px 10px;background:var(--d4);border:1px solid var(--border);color:var(--t1);font-size:13px;border-radius:4px;outline:none;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:8px;max-height:200px;overflow-y:auto;}
.emoji-btn{width:36px;height:36px;background:transparent;border:none;cursor:pointer;font-size:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.emoji-btn:hover{background:var(--d5);}

/* ─── MODALS ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:900;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--d2);border:1px solid var(--border);width:100%;max-width:480px;margin:20px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-family:var(--font-display);font-size:22px;letter-spacing:3px;color:var(--gold);}
.modal-close{margin-left:auto;width:28px;height:28px;background:transparent;border:none;color:var(--t2);cursor:pointer;font-size:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--d5);color:var(--t1);}
.modal-body{padding:20px 24px;}
.modal-section{margin-bottom:20px;}
.modal-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:8px;display:block;}
.modal-input{width:100%;padding:10px 14px;background:var(--d4);border:1px solid var(--border);color:var(--t1);font-family:var(--font-body);font-size:15px;outline:none;border-radius:var(--radius);transition:border-color .2s;}
.modal-input:focus{border-color:var(--gold);}
.modal-select{width:100%;padding:10px 14px;background:var(--d4);border:1px solid var(--border);color:var(--t1);font-family:var(--font-mono);font-size:13px;outline:none;border-radius:var(--radius);cursor:pointer;}
.modal-select option{background:var(--d3);}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.btn-primary{padding:10px 24px;background:var(--blue);border:none;color:white;font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;border-radius:var(--radius);transition:all .2s;}
.btn-primary:hover{background:var(--blue2);}
.btn-danger{padding:10px 24px;background:var(--red);border:none;color:white;font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;border-radius:var(--radius);transition:all .2s;}
.btn-danger:hover{filter:brightness(1.2);}
.btn-ghost{padding:10px 24px;background:transparent;border:1px solid var(--d6);color:var(--t2);font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;border-radius:var(--radius);transition:all .2s;}
.btn-ghost:hover{background:var(--d4);color:var(--t1);}
.btn-gold{padding:10px 24px;background:var(--gold);border:none;color:var(--d0);font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;border-radius:var(--radius);transition:all .2s;}
.btn-gold:hover{background:var(--gold2);}

/* Profile modal avatar */
.profile-avatar-wrap{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.profile-avatar-img{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--d5);border:3px solid var(--d6);}
.profile-avatar-ph{width:72px;height:72px;border-radius:50%;background:var(--d4);display:flex;align-items:center;justify-content:center;font-size:32px;border:3px solid var(--d6);}
.avatar-upload-btn{padding:8px 16px;background:var(--d4);border:1px solid var(--d6);color:var(--t1);font-size:13px;cursor:pointer;border-radius:var(--radius);}
.cargo-badge-preview{display:inline-block;padding:3px 10px;border-radius:var(--radius);font-family:var(--font-mono);font-size:12px;letter-spacing:1px;margin-top:8px;}

/* Role list */
.role-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--d4);border-radius:var(--radius);margin-bottom:8px;}
.role-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.role-name{flex:1;font-weight:600;}
.role-actions{display:flex;gap:4px;}
.role-action-btn{width:26px;height:26px;background:transparent;border:none;cursor:pointer;border-radius:4px;color:var(--t2);font-size:13px;display:flex;align-items:center;justify-content:center;}
.role-action-btn:hover{background:var(--d5);color:var(--t1);}

/* User list in management */
.user-manage-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--d4);border-radius:var(--radius);margin-bottom:6px;}
.user-manage-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--d5);}
.user-manage-info{flex:1;min-width:0;}
.user-manage-name{font-size:14px;font-weight:600;}
.user-manage-cargo{font-size:12px;color:var(--t2);}
.user-manage-actions{display:flex;gap:4px;}

/* Context menu */
.ctx-menu{position:fixed;background:var(--d3);border:1px solid var(--border);z-index:800;padding:4px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.5);border-radius:var(--radius);display:none;}
.ctx-menu.show{display:block;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:14px;color:var(--t1);border-radius:4px;transition:background .15s;}
.ctx-item:hover{background:var(--blue);}
.ctx-item.danger:hover{background:var(--red);}
.ctx-item.danger{color:var(--red);}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* Font options */
.font-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.font-opt{padding:12px;background:var(--d4);border:2px solid transparent;border-radius:var(--radius);cursor:pointer;transition:all .2s;text-align:center;}
.font-opt:hover{border-color:var(--d6);}
.font-opt.active{border-color:var(--gold);}
.font-opt-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.font-opt-preview{font-size:12px;color:var(--t2);}

/* Image preview */
.img-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;cursor:pointer;}
.img-preview-overlay.show{display:flex;}
.img-preview-overlay img{max-width:90vw;max-height:90vh;object-fit:contain;}

/* Toast notifications */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:1100;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;background:var(--d4);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--blue);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* Welcome screen */
.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);text-align:center;padding:40px;}
.welcome-icon{font-size:64px;margin-bottom:16px;opacity:.4;}
.welcome-title{font-family:var(--font-display);font-size:28px;letter-spacing:4px;color:var(--t2);margin-bottom:8px;}
.welcome-sub{font-size:14px;color:var(--t3);}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Responsive */
@media(max-width:768px){
  .members-sidebar{display:none!important;}
  .bar-icons{display:none;}
  .sidebar{width:200px;}
}
@media(max-width:520px){
  .sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:600;transition:left .3s;}
  .sidebar.mobile-open{left:0;}
  .main{width:100%;}
}

/* Color picker */
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.swatch:hover,.swatch.active{border-color:white;transform:scale(1.15);}
input[type=color]{width:28px;height:28px;border:none;background:none;cursor:pointer;padding:0;}

/* Unread indicator */
.ch-item.unread .ch-item-name{color:var(--t1);font-weight:700;}
.ch-item.unread::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:4px;height:4px;border-radius:50%;background:var(--t1);}

/* Mention highlight */
.mention{background:rgba(21,101,200,0.3);color:var(--blue2);padding:0 3px;border-radius:3px;}

// ─── SHA256 ───────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ─── IMAGE COMPRESS ───────────────────────────
function compressImage(file, maxW, maxH, q=0.75) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width:w, height:h} = img;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        if (h > maxH) { w = w * maxH / h; h = maxH; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── TOAST ───────────────────────────────────
function toast(msg, type='info') {
  const w = document.getElementById('toastWrap');

  t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── ESC HTML ─────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function parseContent(text) {
  // Links
  text = esc(text);
  text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // Bold **text**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Mentions @user
  text = text.replace(/@(\w[\w\s]*)/g, '<span class="mention">@$1</span>');
  return text;
}

  const d = new Date(ts);
  return d.toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

  return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

// ─── AUTH ─────────────────────────────────────
window.showLoginTab = function(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabReg').classList.toggle('active', tab==='reg');
  document.getElementById('formLogin').style.display = tab==='login'?'block':'none';
  document.getElementById('formReg').style.display   = tab==='reg'  ?'block':'none';
};

window.doLogin = async function() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  if (!username || !password) { err.textContent='Preencha todos os campos.'; err.classList.add('show'); return; }

  const hash = await sha256(password);
  // Find user by username (scan users)
  const snap = await get(R('users'));
  if (!snap.exists()) { err.textContent='Usuário não encontrado.'; err.classList.add('show'); return; }
  let found = null, foundId = null;
  snap.forEach(c => {
    if (c.val().username === username) { found = c.val(); foundId = c.key; }
  });
  if (!found) { err.textContent='Usuário não encontrado.'; err.classList.add('show'); return; }
  if (found.banned) { err.textContent='Você foi banido do servidor.'; err.classList.add('show'); return; }
  if (found.passwordHash !== hash) { err.textContent='Senha incorreta.'; err.classList.add('show'); return; }

  ME = {...found, id: foundId};
  sessionStorage.setItem('crop_user', JSON.stringify({id:foundId, username:found.username}));
  await update(R(`users/${foundId}`), {online:true, lastSeen:Date.now()});
  startApp();
};

window.doRegister = async function() {
  const username = document.getElementById('regUser').value.trim();
  const pass     = document.getElementById('regPass').value;
  const pass2    = document.getElementById('regPass2').value;
  const err      = document.getElementById('regErr');
  err.classList.remove('show');
  if (!username || !pass) { err.textContent='Preencha todos os campos.'; err.classList.add('show'); return; }
  if (pass !== pass2) { err.textContent='Senhas não conferem.'; err.classList.add('show'); return; }
  if (pass.length < 4) { err.textContent='Senha mínima: 4 caracteres.'; err.classList.add('show'); return; }
  if (username.length < 2) { err.textContent='Nome muito curto.'; err.classList.add('show'); return; }

  // Check name taken
  const snap = await get(R('users'));
  if (snap.exists()) {
    let taken = false;
    snap.forEach(c => { if (c.val().username === username) taken = true; });
    if (taken) { err.textContent='Nome já em uso.'; err.classList.add('show'); return; }
  }

  const hash = await sha256(pass);
  const uid = 'user-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  await set(R(`users/${uid}`), {
    username, displayName:username,
    passwordHash:hash,
    cargo:'recruta',
    avatar:'',
    banned:false,
    createdAt:Date.now(),
    online:false,
  });

  toast('Conta criada! Faça login.', 'success');
  showLoginTab('login');
  document.getElementById('loginUser').value = username;
};

async function tryAutoLogin() {
  const saved = sessionStorage.getItem('crop_user');
  if (!saved) return false;
  const {id, username} = JSON.parse(saved);
  const snap = await get(R(`users/${id}`));
  if (!snap.exists()) return false;
  const user = snap.val();
  if (user.banned) return false;
  ME = {...user, id};
  await update(R(`users/${id}`), {online:true, lastSeen:Date.now()});
  return true;
}

// ─── APP START ────────────────────────────────
async function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');

  // Set logo
  const logoSnap = await get(R('serverLogo'));
  if (logoSnap.exists()) {
    const logo = logoSnap.val();
    const img1 = document.getElementById('serverIconImg');
    const img2 = document.getElementById('loginLogoImg');
    if (img1) { img1.src = logo; img1.style.display='block'; document.getElementById('serverIconText').style.display='none'; }
    if (img2) { img2.src = logo; img2.style.display='block'; }
  }

  updateUserBar();
  listenChannels();
  listenMembers();
  setupPresenceCleanup();
}

function updateUserBar() {
  document.getElementById('ubName').textContent = ME.displayName || ME.username;
  const role = allRoles[ME.cargo];
  document.getElementById('ubCargo').textContent = role ? role.name : ME.cargo;
  if (ME.avatar) {
    const img = document.getElementById('ubAvatar');
    img.src = ME.avatar; img.style.display = 'block';
    document.getElementById('ubAvatarPh').style.display = 'none';
  } else {
    document.getElementById('ubAvatar').style.display = 'none';
    document.getElementById('ubAvatarPh').style.display = 'flex';
  }
}

function setupPresenceCleanup() {
  window.addEventListener('beforeunload', () => {
    if (ME) {
      update(R(`users/${ME.id}`), {online:false, lastSeen:Date.now()});
      if (voiceChannel) leaveVoiceCleanup();
    }
  });
}

// ─── CHANNELS ─────────────────────────────────
function listenChannels() {
  onValue(R('channels'), snap => {
    allChannels = {};
    if (snap.exists()) snap.forEach(c => { allChannels[c.key] = {...c.val(), id:c.key}; });
    renderChannels();
  });
}

function renderChannels() {
  const textChs = Object.values(allChannels).filter(c=>c.type==='text').sort((a,b)=>a.order-b.order);
  const voiceChs = Object.values(allChannels).filter(c=>c.type==='voice').sort((a,b)=>a.order-b.order);

  let html = '';

  // Text channels
  html += `<div class="ch-category">
    <div class="ch-category-header">
      <span>📢 Canais de Texto</span>
      ${hasPerm('manageChannels') ? `<span class="ch-add" onclick="openChannelModal('text')" title="Novo canal">+</span>` : ''}
    </div>`;
  for (const ch of textChs) {
    const isActive = ch.id === currentChannelId;
    const unread = unreadCounts[ch.id] ? `<span class="ch-item-badge">${unreadCounts[ch.id]}</span>` : '';
    html += `<div class="ch-item${isActive?' active':''}${unreadCounts[ch.id]?' unread':''}" onclick="selectChannel('${ch.id}')" oncontextmenu="chContext(event,'${ch.id}')">
      <span class="ch-item-icon">#</span>
      <span class="ch-item-name">${esc(ch.name)}</span>
      ${unread}
    </div>`;
  }
  html += '</div>';

  // Voice channels
  html += `<div class="ch-category" style="margin-top:8px;">
    <div class="ch-category-header">
      <span>🔊 Canais de Voz</span>
      ${hasPerm('manageChannels') ? `<span class="ch-add" onclick="openChannelModal('voice')" title="Novo canal de voz">+</span>` : ''}
    </div>`;
  for (const ch of voiceChs) {
    const inVoice = voiceChannel === ch.id;
    html += `<div class="ch-item${inVoice?' active':''}" onclick="joinVoice('${ch.id}')" oncontextmenu="chContext(event,'${ch.id}')">
      <span class="ch-item-icon">🔊</span>
      <span class="ch-item-name">${esc(ch.name)}</span>
    </div>
    <div class="ch-voice-users" id="voice-users-${ch.id}"></div>`;
  }
  html += '</div>';

  document.getElementById('channelsList').innerHTML = html;
  listenVoicePresence();
}

function chContext(e, chId) {
  e.preventDefault();
  if (!hasPerm('manageChannels')) return;
  showCtxMenu(e, [
    {label:'🗑 Excluir Canal', cls:'danger', fn:()=>deleteChannel(chId)},
  ]);
}

window.openChannelModal = function(type='text') {
  document.getElementById('chType').value = type;
  document.getElementById('chName').value = '';
  openModal('channelModal');
};

window.createChannel = async function() {
  if (!hasPerm('manageChannels')) return;
  const type = document.getElementById('chType').value;
  const name = document.getElementById('chName').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  if (!name) return;
  const id = (type==='text'?'text-':'voice-') + name + '-' + Date.now();
  const order = Object.values(allChannels).filter(c=>c.type===type).length + (type==='text'?0:10);
  await set(R(`channels/${id}`), {name, type, order, createdAt:Date.now()});
  closeModal('channelModal');
  toast(`Canal #${name} criado!`, 'success');
};

async function deleteChannel(chId) {
  if (!confirm('Excluir este canal?')) return;
  await remove(R(`channels/${chId}`));
  await remove(R(`messages/${chId}`));
  if (currentChannelId === chId) { currentChannelId = null; showWelcome(); }
  toast('Canal excluído.', 'info');
}

// ─── SELECT CHANNEL ───────────────────────────
window.selectChannel = function(chId) {
  if (currentChannelId === chId) return;
  if (msgListener) { off(R(`messages/${currentChannelId}`), 'child_added', msgListener); }
  currentChannelId = chId;
  unreadCounts[chId] = 0;

  const ch = allChannels[chId];
  if (!ch) return;

  document.getElementById('chHeaderIcon').textContent = '#';
  document.getElementById('chHeaderName').textContent = ch.name;
  document.getElementById('chHeaderTopic').textContent = '';
  document.getElementById('msgInput').placeholder = `Mensagem #${ch.name}`;

  document.getElementById('welcomeScreen').style.display = 'none';
  const chatArea = document.getElementById('chatArea');
  chatArea.style.display = 'flex';

  document.querySelectorAll('.ch-item').forEach(el=>el.classList.remove('active'));

  loadMessages(chId);
  renderChannels();
};

function showWelcome() {
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('chatArea').style.display = 'none';
}

// ─── MESSAGES ─────────────────────────────────
let messageCache = {};

function loadMessages(chId) {
  const wrap = document.getElementById('messagesWrap');
  wrap.innerHTML = '';
  messageCache = {};

  const q = query(R(`messages/${chId}`), orderByChild('ts'), limitToLast(80));
  if (msgListener) off(R(`messages/${currentChannelId}`), 'child_added', msgListener);

  msgListener = onChildAdded(q, snap => {
    const msg = {...snap.val(), id:snap.key};
    messageCache[msg.id] = msg;
    appendMessage(msg, chId);
    setTimeout(()=>scrollToBottom(), 50);
  });

  // Listen for removals (deleted messages)
  onChildRemoved(R(`messages/${chId}`), snap => {
    const el = document.getElementById('msg-'+snap.key);
    if (el) el.querySelector('.msg-content').innerHTML = '<em class="msg-deleted">Mensagem apagada</em>';
  });
}

function appendMessage(msg, chId) {
  if (chId !== currentChannelId) return;
  const wrap = document.getElementById('messagesWrap');

  const prevMsgs = wrap.querySelectorAll('.msg');
  const prev = prevMsgs.length > 0 ? prevMsgs[prevMsgs.length-1] : null;
  const prevUserId = prev ? prev.dataset.user : null;
  const prevTs = prev ? parseInt(prev.dataset.ts) : 0;
  const isGrouped = prevUserId === msg.userId && (msg.ts - prevTs) < 5 * 60 * 1000;

  const role = allRoles[msg.userCargo];
  const roleColor = role ? role.color : '#8b949e';
  const roleName  = role ? role.name  : '';

  const avatarHtml = msg.userAvatar
    ? `<img class="msg-avatar" src="${msg.userAvatar}" onclick="openUserProfile('${msg.userId}')">`
    : `<div class="msg-avatar-placeholder" onclick="openUserProfile('${msg.userId}')">👤</div>`;

  const canDelete = hasPerm('deleteMessages') || msg.userId === ME.id;
  const canEdit   = msg.userId === ME.id;

  const actionsHtml = `<div class="msg-actions">
    ${canEdit ? `<button class="msg-action-btn" onclick="editMsg('${msg.id}')" title="Editar">✏️</button>` : ''}
    ${canDelete ? `<button class="msg-action-btn del" onclick="deleteMsg('${msg.id}','${chId}')" title="Apagar">🗑</button>` : ''}
    <button class="msg-action-btn" onclick="replyMsg('${msg.id}')" title="Responder">↩</button>
  </div>`;

  let html = '';
  if (!isGrouped) {
    html = `<div class="msg msg-first" id="msg-${msg.id}" data-user="${msg.userId}" data-ts="${msg.ts}">
      ${avatarHtml}
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-author" style="color:${roleColor}" onclick="openUserProfile('${msg.userId}')">${esc(msg.displayName||msg.username)}</span>
          ${roleName ? `<span class="msg-cargo" style="background:${roleColor}22;color:${roleColor};">${esc(roleName)}</span>` : ''}
          <span class="msg-time">${timeAgo(msg.ts)}</span>
        </div>
        ${msg.image ? `<img class="msg-image" src="${msg.image}" onclick="previewImage('${msg.image}')">` : ''}
        <div class="msg-content">${parseContent(msg.content||'')}</div>
      </div>
      ${actionsHtml}
    </div>`;
  } else {
    html = `<div class="msg msg-cont" id="msg-${msg.id}" data-user="${msg.userId}" data-ts="${msg.ts}">
      <div class="msg-cont-gap" title="${timeAgo(msg.ts)}" style="cursor:default;font-size:10px;color:var(--t3);text-align:right;padding-top:4px;">${shortTime(msg.ts)}</div>
      <div class="msg-body">
        ${msg.image ? `<img class="msg-image" src="${msg.image}" onclick="previewImage('${msg.image}')">` : ''}
        <div class="msg-content">${parseContent(msg.content||'')}</div>
      </div>
      ${actionsHtml}
    </div>`;
  }

  wrap.insertAdjacentHTML('beforeend', html);
}

window.sendMessage = async function() {
  if (!currentChannelId) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  const pendingImg = window._pendingImage;
  if (!content && !pendingImg) return;

  const msgData = {
    userId:      ME.id,
    username:    ME.username,
    displayName: ME.displayName || ME.username,
    userCargo:   ME.cargo,
    userAvatar:  ME.avatar || '',
    content:     content,
    ts:          Date.now(),
  };
  if (pendingImg) { msgData.image = pendingImg; window._pendingImage = null; clearImagePreview(); }

  input.value = '';
  autoResize(input);
  await push(R(`messages/${currentChannelId}`), msgData);
  scrollToBottom();
};

window.deleteMsg = async function(msgId, chId) {
  if (!confirm('Apagar esta mensagem?')) return;
  await remove(R(`messages/${chId}/${msgId}`));
};

window.editMsg = function(msgId) {
  const msg = messageCache[msgId];
  if (!msg || msg.userId !== ME.id) return;
  const input = document.getElementById('msgInput');
  input.value = msg.content;
  input.focus();
  window._editingMsgId = msgId;
  input.placeholder = 'Editando mensagem...';
};

window.replyMsg = function(msgId) {
  const msg = messageCache[msgId];
  if (!msg) return;
  const input = document.getElementById('msgInput');
  input.value = `@${msg.displayName||msg.username} `;
  input.focus();
};

window.handleMsgKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (window._editingMsgId) {
      saveEdit();
    } else {
      sendMessage();
    }
  }
  if (e.key === 'Escape' && window._editingMsgId) {
    cancelEdit();
  }
};

async function saveEdit() {
  const msgId = window._editingMsgId;
  const content = document.getElementById('msgInput').value.trim();
  if (!content) return;
  await update(R(`messages/${currentChannelId}/${msgId}`), {content, edited:true});
  cancelEdit();
  const el = document.getElementById('msg-'+msgId);
  if (el) el.querySelector('.msg-content').innerHTML = parseContent(content);
}

function cancelEdit() {
  window._editingMsgId = null;
  const input = document.getElementById('msgInput');
  input.value = '';
  const ch = allChannels[currentChannelId];
  input.placeholder = ch ? `Mensagem #${ch.name}` : 'Mensagem...';
}

function scrollToBottom() {
  const w = document.getElementById('messagesWrap');
  w.scrollTop = w.scrollHeight;
}

// Typing indicator
window.sendTyping = function() {
  if (!ME || !currentChannelId) return;
  if (typingTimeout) clearTimeout(typingTimeout);
  set(R(`typing/${currentChannelId}/${ME.id}`), {name:ME.displayName||ME.username, ts:Date.now()});
  typingTimeout = setTimeout(() => remove(R(`typing/${currentChannelId}/${ME.id}`)), 3000);
};

function listenTyping(chId) {
  if (typingListeners[chId]) return;
  typingListeners[chId] = onValue(R(`typing/${chId}`), snap => {
    if (chId !== currentChannelId) return;
    const typing = [];
    if (snap.exists()) snap.forEach(c => { if (c.key !== ME.id && c.val().name) typing.push(c.val().name); });
    const el = document.getElementById('typingIndicator');
    if (typing.length === 0) el.textContent = '';
    else if (typing.length === 1) el.textContent = `${typing[0]} está digitando...`;
    else el.textContent = `${typing.join(', ')} estão digitando...`;
  });
}

// ─── IMAGE UPLOAD ─────────────────────────────
window.triggerImgUpload = function() { document.getElementById('imgUploadInput').click(); };

window.handleImageUpload = async function(e) {

  window._pendingImage = compressed;

window.previewImage = function(src) {

// ─── MEMBERS ──────────────────────────────────
function listenMembers() {
  onValue(R('users'), snap => {
    allUsers = {};
    if (snap.exists()) snap.forEach(c => { allUsers[c.key] = {...c.val(), id:c.key}; });
    renderMembers();
    updateUserBar();
    // Refresh ME
    if (ME && allUsers[ME.id]) ME = {...allUsers[ME.id], id:ME.id};
  });
}

function renderMembers() {
  const sidebar = document.getElementById('membersList');
  const roleGroups = {};
  for (const [uid, user] of Object.entries(allUsers)) {
    if (user.banned) continue;
    const cargo = user.cargo || 'recruta';
    if (!roleGroups[cargo]) roleGroups[cargo] = [];
    roleGroups[cargo].push({...user, id:uid});
  }

  const sortedRoles = Object.entries(allRoles).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  let html = '';
  for (const [roleId, role] of sortedRoles) {
    const members = (roleGroups[roleId]||[]).sort((a,b)=>(b.online?1:0)-(a.online?1:0));
    if (!members.length) continue;
    const online = members.filter(m=>m.online).length;
    html += `<div class="members-role-group">
      <div class="members-role-title" style="color:${role.color}">${esc(role.name)} — ${online}/${members.length}</div>`;
    for (const m of members) {
      const avatarHtml = m.avatar
        ? `<img class="member-avatar" src="${m.avatar}">`
        : `<div class="member-avatar-ph">👤</div>`;
      html += `<div class="member-item" onclick="openUserProfile('${m.id}')">
        <div style="position:relative;">
          ${avatarHtml}
          <div class="status-dot ${m.online?'online':'offline'}" style="position:absolute;bottom:0;right:0;border:2px solid var(--d2);"></div>
        </div>
        <div class="member-info">
          <div class="member-name" style="color:${role.color}">${esc(m.displayName||m.username)}</div>
          <div class="member-status">${m.online ? 'Online' : 'Offline'}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  sidebar.innerHTML = html || '<div style="padding:16px;font-size:13px;color:var(--t3);">Nenhum membro</div>';
}

window.toggleMembers = function() {
  document.getElementById('membersSidebar').classList.toggle('show');
};

// ─── VOICE ────────────────────────────────────
window.joinVoice = async function(chId) {
  if (voiceChannel === chId) { leaveVoice(); return; }
  if (voiceChannel) await leaveVoiceCleanup();
  voiceChannel = chId;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    isMuted = false;
    document.getElementById('mutBtn').classList.remove('active');
  } catch(e) {
    toast('Microfone não disponível — entrando em modo silencioso.', 'info');
    localStream = null;
  }

  const ch = allChannels[chId];
  document.getElementById('voiceChName').textContent = `🎤 ${ch?.name||chId}`;
  document.getElementById('voiceArea').classList.add('show');

  await set(R(`voicePresence/${chId}/${ME.id}`), {
    name: ME.displayName||ME.username,
    ts: Date.now(),
  });

  listenVoicePresence();
  renderChannels();
  toast(`Entrou em ${ch?.name||chId}`, 'success');
};

window.leaveVoice = async function() {
  await leaveVoiceCleanup();
  toast('Desconectado do canal de voz.', 'info');
};

async function leaveVoiceCleanup() {
  if (!voiceChannel) return;
  await remove(R(`voicePresence/${voiceChannel}/${ME.id}`));
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  for (const pc of Object.values(peerConnections)) pc.close();
  peerConnections = {};
  voiceChannel = null;
  document.getElementById('voiceArea').classList.remove('show');
  renderChannels();
}

window.toggleMute = function() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = document.getElementById('mutBtn');
  btn.classList.toggle('active', isMuted);

  const voiceChs = Object.values(allChannels).filter(c=>c.type==='voice');
  for (const ch of voiceChs) {
    onValue(R(`voicePresence/${ch.id}`), snap => {
      const el = document.getElementById(`voice-users-${ch.id}`);
      if (!el) return;
      let html = '';
      if (snap.exists()) {
        snap.forEach(c => {
          const active = c.key === ME.id && voiceChannel === ch.id;
          html += `<div class="ch-voice-user${active?' voice-active':''}">${esc(c.val().name)}</div>`;

      el.innerHTML = html;

function renderRolesList() {
  const sorted = Object.entries(allRoles).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  let html = '';
  for (const [id, role] of sorted) {
    const isSystem = ['alto-comando','oficial','policial','recruta'].includes(id);
    html += `<div class="role-item">
      <div class="role-color-dot" style="background:${role.color}"></div>
      <span class="role-name" style="color:${role.color}">${esc(role.name)}</span>
      <div class="role-actions">
        <button class="role-action-btn" onclick="editRole('${id}')" title="Editar">✏️</button>
        ${!isSystem ? `<button class="role-action-btn" onclick="deleteRole('${id}')" title="Excluir">🗑</button>` : ''}
      </div>
    </div>`;
  }
  document.getElementById('rolesList').innerHTML = html;

window.editRole = function(roleId) {
  const role = allRoles[roleId];
  if (!role) return;
  editingRoleId = roleId;
  selectedRoleColor = role.color;
  document.getElementById('roleName').value = role.name;
  document.getElementById('roleModalTitle').textContent = 'Editar Cargo';
  renderPermCheckboxes(role.permissions||{});
  renderColorSwatches();
  openModal('roleModal');
};

window.deleteRole = async function(roleId) {
  if (!confirm('Excluir este cargo? Membros serão movidos para Recruta.')) return;
  // Move members to recruta
  for (const [uid, user] of Object.entries(allUsers)) {
    if (user.cargo === roleId) await update(R(`users/${uid}`), {cargo:'recruta'});
  }
  await remove(R(`roles/${roleId}`));
  toast('Cargo excluído.', 'info');
};

window.saveRole = async function() {
  if (!hasPerm('manageRoles')) return;
  const name = document.getElementById('roleName').value.trim();
  if (!name) return;
  const perms = {};
  document.querySelectorAll('.perm-cb').forEach(cb => { if (cb.checked) perms[cb.dataset.perm] = true; });
  const roleData = {name, color:selectedRoleColor, permissions:perms, order: editingRoleId ? (allRoles[editingRoleId]?.order||99) : Object.keys(allRoles).length};
  if (editingRoleId) {
    await update(R(`roles/${editingRoleId}`), roleData);
  } else {
    const id = 'role-' + Date.now();
    await set(R(`roles/${id}`), roleData);
  }
  editingRoleId = null;
  closeModal('roleModal');
  toast('Cargo salvo!', 'success');
};

function renderPermCheckboxes(active={}) {
  let html = '';
  for (const [key, label] of Object.entries(PERMS)) {
    html += `<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;font-size:14px;">
      <input type="checkbox" class="perm-cb" data-perm="${key}" ${active[key]?'checked':''}>
      ${label}
    </label>`;
  }
  document.getElementById('permCheckboxes').innerHTML = html;
}

function renderUserList(filter='') {
  const users = Object.values(allUsers).filter(u => !filter || (u.username||'').toLowerCase().includes(filter.toLowerCase()) || (u.displayName||'').toLowerCase().includes(filter.toLowerCase()));
  let html = '';
  for (const u of users) {

    html += `<div class="user-manage-item">
      ${avatarHtml}
      <div class="user-manage-info">
        <div class="user-manage-name">${esc(u.displayName||u.username)} ${u.banned?'<span style="color:var(--red);font-size:11px;">[BANIDO]</span>':''}</div>
        <div class="user-manage-cargo" style="color:${roleColor}">${role?.name||u.cargo}</div>
      </div>
      <div class="user-manage-actions">
        <button class="btn-ghost" onclick="openUserProfile('${u.id}')" style="padding:6px 12px;font-size:13px;">Gerenciar</button>

  }

window.openUserProfile = function(userId) {
  viewingUserId = userId;
  const u = allUsers[userId];
  if (!u) return;
  const role = allRoles[u.cargo];
  const roleColor = role ? role.color : '#8b949e';

  document.getElementById('upModalName').textContent = u.displayName||u.username;
  document.getElementById('upName').textContent = u.displayName||u.username;
  document.getElementById('upAvatar').src = u.avatar||'';
  document.getElementById('upCargo').innerHTML = role ? `<span class="msg-cargo" style="background:${roleColor}22;color:${roleColor};">${esc(role.name)}</span>` : '';

  const adminCtrl = document.getElementById('upAdminControls');
  if (hasPerm('kickMembers') || hasPerm('banMembers') || hasPerm('manageRoles')) {
    adminCtrl.style.display = 'block';
    let roleOpts = '';
    for (const [rid, r] of Object.entries(allRoles)) {
      roleOpts += `<option value="${rid}" ${u.cargo===rid?'selected':''}>${r.name}</option>`;
    }
    document.getElementById('upRoleSelect').innerHTML = roleOpts;

    adminCtrl.style.display = 'none';

};

window.kickUser = async function() {
  if (!hasPerm('kickMembers')) return;
  if (!confirm('Expulsar este membro? Ele poderá entrar novamente.')) return;

window.openProfile = function() {

  const ph  = document.getElementById('profileAvatarPh');

window.uploadAvatar = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const compressed = await compressImage(file, 128, 128, 0.8);
  ME.avatar = compressed;
  await update(R(`users/${ME.id}`), {avatar:compressed});
  document.getElementById('profileAvatarImg').src=compressed;
  document.getElementById('profileAvatarImg').style.display='block';

};

window.saveProfile = async function() {
  const displayName = document.getElementById('profileDisplayName').value.trim();
  const newPass = document.getElementById('profileNewPass').value;
  if (!displayName) { toast('Nome não pode ser vazio.', 'error'); return; }

  const updates = {displayName};
  if (newPass) {
    if (newPass.length < 4) { toast('Senha mínima: 4 caracteres.', 'error'); return; }
    updates.passwordHash = await sha256(newPass);
  }
  ME.displayName = displayName;
  await update(R(`users/${ME.id}`), updates);
  updateUserBar();
  closeModal('profileModal');
  toast('Perfil salvo!', 'success');
};

window.showCtxMenu = function(e, items) {
  e.preventDefault();
  const menu = document.getElementById('ctxMenu');
  let html = '';
  for (const item of items) {
    if (item.sep) { html += '<div class="ctx-sep"></div>'; continue; }
    html += `<div class="ctx-item${item.cls?' '+item.cls:''}" onclick="ctxAction(${items.indexOf(item)})">${item.label}</div>`;
  }
  menu.innerHTML = html;
  menu.style.left = Math.min(e.clientX, window.innerWidth-180) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight-200) + 'px';
  menu.classList.add('show');
  menu._items = items;
};

window.ctxAction = function(idx) {
  const menu = document.getElementById('ctxMenu');
  const item = menu._items[idx];
  if (item && item.fn) item.fn();
  menu.classList.remove('show');
};

window.createMember = async function() {
  if (!hasPerm('admin')) { toast('Sem permissão.', 'error'); return; }
  const username = document.getElementById('cmUser').value.trim();
  const pass     = document.getElementById('cmPass').value;
  const cargo    = document.getElementById('cmCargo').value;
  if (!username) { toast('Informe o nome de usuário.', 'error'); return; }
  if (pass.length < 4) { toast('Senha mínima: 4 caracteres.', 'error'); return; }

  // Check name taken
  const snap = await get(R('users'));
  if (snap.exists()) {
    let taken = false;
    snap.forEach(c => { if (c.val().username === username) taken = true; });
    if (taken) { toast('Nome já em uso.', 'error'); return; }
  }

  const hash = await sha256(pass);
  const uid = 'user-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  await set(R(`users/${uid}`), {
    username, displayName:username,
    passwordHash:hash,
    cargo: cargo || 'recruta',
    avatar:'',
    banned:false,
    createdAt:Date.now(),
    online:false,
  });
  closeModal('createMemberModal');
  toast(`Login criado para ${username}!`, 'success');
};

window.deleteMemberAccount = async function() {
  if (!hasPerm('admin')) { toast('Sem permissão.', 'error'); return; }
  if (!viewingUserId) return;
  const u = allUsers[viewingUserId];
  if (!confirm(`Apagar a conta de "${u?.username}" permanentemente? Isso não pode ser desfeito.`)) return;
  await remove(R(`users/${viewingUserId}`));
  closeModal('userProfileModal');
  toast('Conta apagada.', 'info');
};

// ─── INIT ─────────────────────────────────────
async function init() {
  applySavedFont();
  await setupDefaultData();

  // Load roles first
  const rolesSnap = await get(R('roles'));
  if (rolesSnap.exists()) rolesSnap.forEach(c => { allRoles[c.key] = {...c.val(), id:c.key}; });
  listenRoles();

  // Try auto-login
  const autoLogged = await tryAutoLogin();
  if (autoLogged) {
    startApp();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
  }

  initEmoji();
}

init().catch(console.error);

// Logout handler
window.logout = function() {
  if (ME) update(R(`users/${ME.id}`), {online:false});
  sessionStorage.removeItem('crop_user');
  location.reload();
};
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after login
  const btn = document.createElement('button');
  btn.textContent = '📲 Instalar App';
  btn.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#c9a84c;color:#060a10;border:none;padding:12px 24px;font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;border-radius:6px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4);';
  btn.id = 'installBtn';
  btn.onclick = async () => {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') btn.remove();
    deferredPrompt = null;
  };
  document.body.appendChild(btn);
  setTimeout(() => { if(document.getElementById('installBtn')) document.getElementById('installBtn').remove(); }, 30000);
});
</script>
